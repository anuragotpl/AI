<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #020617;
  padding: 15px;
  border-right: 1px solid #1e293b;
}

.chat-history {
  margin-top: 20px;
}

.chat-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.chat-item:hover {
  background: #1e293b;
}

/* Chat area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* Messages */
.msg {
  max-width: 70%;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

/* Input */
.input-box {
  display: flex;
  padding: 15px;
  border-top: 1px solid #1e293b;
}

.input-box input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

.input-box button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chatbox"></div>

<div class="input-area">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
</div>

<script>

function addMessage(role, content){
    let div = document.createElement("div");
    div.className = "message " + role;

    let bubble = document.createElement("div");
    bubble.className = "bubble";

    // IMAGE CHECK
    if(content.endsWith(".png")){
        bubble.innerHTML = `
            <img src="${content}" width="200"><br>
            <a href="${content}" download>Download</a>
        `;
    } else {
        bubble.innerText = content;
    }

    div.appendChild(bubble);
    document.getElementById("chatbox").appendChild(div);
}


async function send(){
    let input = document.getElementById("msg");
    let msg = input.value.trim();

    if(!msg) return;

    addMessage("user", msg);
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    if(data.type === "image"){
        addMessage("ai", data.file);
    } else {
        addMessage("ai", data.message);
    }
}

</script>

</body>
</html>
