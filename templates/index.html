<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnuAI Pro – Your Personal AI Assistant</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 250px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-right: 1px solid rgba(255,255,255,0.1);
}

.sidebar h2 {
  margin: 0;
}

.chat-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.chat-item:hover {
  background: rgba(255,255,255,0.1);
}

/* Chat */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* Message */
.message {
  display: flex;
  margin-bottom: 15px;
  animation: fadeIn 0.3s ease-in;
}

.user {
  justify-content: flex-end;
}

.ai {
  justify-content: flex-start;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin: 0 8px;
}

.bubble {
  padding: 12px;
  border-radius: 12px;
  max-width: 65%;
  position: relative;
}

.user .bubble {
  background: #2563eb;
}

.ai .bubble {
  background: rgba(255,255,255,0.08);
}

/* Copy */
.copy-btn {
  position: absolute;
  top: 5px;
  right: 8px;
  cursor: pointer;
  opacity: 0;
}

.bubble:hover .copy-btn {
  opacity: 1;
}

/* Time */
.time {
  font-size: 10px;
  color: gray;
  margin-top: 5px;
}

/* Input */
.input-area {
  display: flex;
  padding: 15px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  cursor: pointer;
}

/* Loader */
.loader {
  border: 3px solid #1e293b;
  border-top: 3px solid #22c55e;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🤖 AnuAI</h2>
    <button onclick="newChat()">+ New Chat</button>
  </div>

  <div class="chat-area">

    <div id="chatbox" class="messages"></div>

    <div class="input-area">
      <input id="msg" placeholder="Type message...">
      <button onclick="send()" id="sendBtn">Send</button>
    </div>

  </div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("chats")) || [];

function saveChat(role, msg){
  chats.push({role, msg});
  localStorage.setItem("chats", JSON.stringify(chats));
}

function newChat(){
  document.getElementById("chatbox").innerHTML = "";
  localStorage.removeItem("chats");
}

function scrollBottom(){
  let box = document.getElementById("chatbox");
  box.scrollTop = box.scrollHeight;
}

function typingEffect(element, text){
  let i = 0;
  element.textContent = "";

  function type(){
    if(i < text.length){
      element.textContent += text.charAt(i);
      i++;
      setTimeout(type, 15);
    }
  }

  type();
}

function formatCode(text){
  return text.replace(/```(.*?)```/gs,
    '<pre style="background:black;padding:10px;border-radius:8px;overflow:auto;"><code>$1</code></pre>'
  );
}

function addMessage(role, content, typing=false){

  let div = document.createElement("div");
  div.className = "message " + role;

  let avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = role === "user"
    ? "https://i.pravatar.cc/40?img=3"
    : "https://i.pravatar.cc/40?img=5";

  let bubble = document.createElement("div");
  bubble.className = "bubble";

  // ✅ TEXT ONLY container
  let textDiv = document.createElement("div");
  textDiv.className = "text";

  // copy button
  let copyBtn = document.createElement("span");
  copyBtn.className = "copy-btn";
  copyBtn.innerText = "📋";
  copyBtn.onclick = () => navigator.clipboard.writeText(content);

  // time
  let time = document.createElement("div");
  time.className = "time";
  time.innerText = new Date().toLocaleTimeString();

  // 👉 CONTENT LOGIC
  if(content.endsWith(".png")){
    textDiv.innerHTML = `<img src="${content}" width="200">`;
  }
  else{
    if(typing){
      typingEffect(textDiv, content); // 👈 ONLY HERE
    } else {
      textDiv.textContent = content;
    }
  }

  // 👉 correct order
  bubble.appendChild(copyBtn);
  bubble.appendChild(textDiv);
  bubble.appendChild(time);

  if(role === "ai"){
    div.appendChild(avatar);
    div.appendChild(bubble);
  } else {
    div.appendChild(bubble);
    div.appendChild(avatar);
  }

  document.getElementById("chatbox").appendChild(div);
  scrollBottom();
}

async function send(){
  let input = document.getElementById("msg");
  let btn = document.getElementById("sendBtn");
  let msg = input.value.trim();

  if(!msg) return;

  addMessage("user", msg);
  saveChat("user", msg);

  input.value = "";
  btn.disabled = true;

  let loaderDiv = document.createElement("div");
  loaderDiv.className = "message ai";
  loaderDiv.innerHTML = `<div class="bubble"><div class="loader"></div></div>`;
  document.getElementById("chatbox").appendChild(loaderDiv);
  scrollBottom();

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: msg})
  });

  let data = await res.json();

  loaderDiv.remove();

  if(data.type === "image"){
    addMessage("ai", data.file);
    saveChat("ai", data.file);
  } else {
    addMessage("ai", data.message, true);
    saveChat("ai", data.message);
  }

  btn.disabled = false;
}

document.getElementById("msg").addEventListener("keypress", function(e){
  if(e.key === "Enter") send();
});

</script>

</body>
</html>
