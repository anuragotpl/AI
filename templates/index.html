<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

#chatbox {
    height: 80vh;
    overflow-y: auto;
    padding: 20px;
}

.message {
    margin: 10px 0;
}

.user {
    text-align: right;
}

.ai {
    text-align: left;
}

.bubble {
    display: inline-block;
    padding: 10px;
    border-radius: 10px;
    max-width: 60%;
}

.user .bubble {
    background: #3b82f6;
}

.ai .bubble {
    background: #334155;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="chatbox"></div>

<div class="input-area">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
</div>

<script>

function addMessage(role, content){
    let div = document.createElement("div");
    div.className = "message " + role;

    let bubble = document.createElement("div");
    bubble.className = "bubble";

    // IMAGE CHECK
    if(content.endsWith(".png")){
        bubble.innerHTML = `
            <img src="${content}" width="200"><br>
            <a href="${content}" download>Download</a>
        `;
    } else {
        bubble.innerText = content;
    }

    div.appendChild(bubble);
    document.getElementById("chatbox").appendChild(div);
}


async function send(){
    let input = document.getElementById("msg");
    let msg = input.value.trim();

    if(!msg) return;

    addMessage("user", msg);
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    if(data.type === "image"){
        addMessage("ai", data.file);
    } else {
        addMessage("ai", data.message);
    }
}

</script>

</body>
</html>
