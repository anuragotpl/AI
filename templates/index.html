<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnuAI Chat</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background: #020617;
  padding: 15px;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  margin: 0;
}

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Messages */
.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  display: flex;
  margin-bottom: 12px;
}

.user {
  justify-content: flex-end;
}

.ai {
  justify-content: flex-start;
}

.bubble {
  max-width: 65%;
  padding: 12px;
  border-radius: 10px;
}

.user .bubble {
  background: #2563eb;
}

.ai .bubble {
  background: #1e293b;
}

/* Input */
.input-area {
  display: flex;
  padding: 15px;
  border-top: 1px solid #1e293b;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* Loader */
.loader {
  border: 3px solid #1e293b;
  border-top: 3px solid #22c55e;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🤖 AnuAI</h2>
    <p style="font-size:12px;color:gray;">Your AI Assistant</p>
  </div>

  <!-- Chat -->
  <div class="chat-area">

    <div id="chatbox" class="messages"></div>

    <div class="input-area">
      <input id="msg" placeholder="Type message...">
      <button onclick="send()" id="sendBtn">Send</button>
    </div>

  </div>

</div>

<script>

// Add message
function addMessage(role, content, isTyping=false){
    let div = document.createElement("div");
    div.className = "message " + role;

    let bubble = document.createElement("div");
    bubble.className = "bubble";

    if(isTyping){
        typingEffect(bubble, content);
    } else {
        if(content.endsWith(".png")){
            bubble.innerHTML = `
                <img src="${content}" width="200"><br>
                <a href="${content}" download>Download</a>
            `;
        } else {
            bubble.innerText = content;
        }
    }

    div.appendChild(bubble);
    document.getElementById("chatbox").appendChild(div);

    scrollBottom();
}

// Typing effect
function typingEffect(element, text) {
  let i = 0;
  element.innerHTML = "";

  function type() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 15);
    }
  }
  type();
}

// Scroll auto
function scrollBottom(){
    let box = document.getElementById("chatbox");
    box.scrollTop = box.scrollHeight;
}

// Send message
async function send(){
    let input = document.getElementById("msg");
    let btn = document.getElementById("sendBtn");
    let msg = input.value.trim();

    if(!msg) return;

    addMessage("user", msg);
    input.value = "";

    // disable button
    btn.disabled = true;

    // loader
    let loaderDiv = document.createElement("div");
    loaderDiv.className = "message ai";
    loaderDiv.innerHTML = `<div class="bubble"><div class="loader"></div></div>`;
    document.getElementById("chatbox").appendChild(loaderDiv);
    scrollBottom();

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    // remove loader
    loaderDiv.remove();

    if(data.type === "image"){
        addMessage("ai", data.file);
    } else {
        addMessage("ai", data.message, true); // typing effect
    }

    btn.disabled = false;
}

// Enter to send
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        send();
    }
});

</script>

</body>
</html>
